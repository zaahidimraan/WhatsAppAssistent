version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: a1-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - WEBHOOK_URL=https://${NGROK_DOMAIN}/
      - N8N_ENCRYPTION_KEY=a1-driving-school-enc-key-change-me
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      - INSTRUCTOR_WHATSAPP=${INSTRUCTOR_WHATSAPP}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - ngrok

  ngrok:
    image: ngrok/ngrok:latest
    container_name: a1-ngrok
    restart: unless-stopped
    command: http n8n:5678 --domain=${NGROK_DOMAIN} --log stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"

volumes:
  n8n_data:
