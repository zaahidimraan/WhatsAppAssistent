name: Deploy Z tech portfolio to GitHub Pages

# Builds ztech-portfolio/ on every push to main/master and publishes to Pages.
on:
  push:
    branches: [main, master]
    paths:
      - 'ztech-portfolio/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ztech-portfolio
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ztech-portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # For project sites the URL is https://USER.github.io/REPO/, so Vite
          # needs base="/REPO/". Auto-derived from the repo name.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ztech-portfolio/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
